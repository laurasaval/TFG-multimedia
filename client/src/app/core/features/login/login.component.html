<div class="login-page">
    <div class="login-background" aria-hidden="true">
        <div class="login-background__slide" *ngFor="let image of backgroundImages; let i = index"
            [class.login-background__slide--active]="i === activeBackgroundIndex"
            [style.background-image]="'url(' + image.url + ')'"></div>

        <div class="login-background__overlay"></div>
        <div class="login-background__grid"></div>
    </div>
    <main class="login-container">
        <h2>Eurovisión 2026 Viena</h2>
        <form (ngSubmit)="onSubmit()" [attr.aria-describedby]="errorMessage ? 'login-help login-error' : 'login-help'"
            novalidate>
            <p id="login-help" class="form-help">
                Introduce tus credenciales de votante para acceder de forma segura.
            </p>

            <div class="form-group">
                <label for="voterId">ID de Votante</label>
                <input type="text" id="voterId" [(ngModel)]="voterId" name="voterId" autocomplete="username"
                    data-testid="voter-id-input" required>
            </div>
            <div class="form-group">
                <label for="secretCode">Código Secreto</label>
                <input type="password" id="secretCode" [(ngModel)]="secretCode" name="secretCode"
                    data-testid="secret-code-input" required>
            </div>
            <div class="form-group">
                <label for="privateKey">Clave Privada</label>
                <p id="privateKey-help" class="field-help">
                    Selecciona tu archivo PEM privado.
                </p>
                <input type="file" id="privateKey" (change)="onPemSelected($event)" accept=".pem" required
                    aria-describedby="privateKey-help" data-testid="identity-private-key-file-input">
            </div>
            <button type="submit" [disabled]="loading" data-testid="login-button">{{ loading ? 'Iniciando sesión...' :
                'Iniciar Sesión' }}</button>
            <div *ngIf="errorMessage" id="login-error" class="error-message" role="alert" aria-live="assertive">{{
                errorMessage }}</div>
        </form>
    </main>
</div>
